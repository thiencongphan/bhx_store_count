name: Cao BHX hang ngay

on:
  schedule:
    # Chay luc 23:00 UTC = 06:00 gio Viet Nam (UTC+7), hang ngay.
    - cron: "0 23 * * *"
  workflow_dispatch:        # cho phep bam chay tay tren tab Actions

permissions:
  contents: write           # cho phep commit nguoc lai repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cai thu vien
        run: pip install -r requirements.txt

      - name: Chay scraper
        env:
          BHX_AUTHORIZATION: ${{ secrets.BHX_AUTHORIZATION }}
          BHX_DEVICEID: ${{ secrets.BHX_DEVICEID }}
          BHX_XAPIKEY: ${{ secrets.BHX_XAPIKEY }}
        run: python bhx_store_scraper.py

      - name: Commit ket qua
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bhx_output/
          if git diff --staged --quiet; then
            echo "Khong co thay doi de commit."
          else
            git commit -m "Cap nhat du lieu cua hang BHX $(date -u +%Y-%m-%d)"
            git push
          fi
